<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Local-SDFT{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  {% block head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="inner">
      <a class="brand" href="/">Local-SDFT</a>
      <nav>
        <a href="/" class="{% if active == 'home' %}active{% endif %}">Overview</a>
        <a href="/data" class="{% if active == 'data' %}active{% endif %}">Collect Data</a>
        <a href="/perf" class="{% if active == 'perf' %}active{% endif %}">Performance</a>
      </nav>
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
