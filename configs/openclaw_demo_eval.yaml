# Held-out OpenClaw tool-use eval (disjoint from SDFT train).
# Canonical file: data/openclaw_eval_heldout.jsonl — see data/openclaw_split_manifest.json.

model:
  name: LiquidAI/LFM2.5-230M
  dtype: float32

toolcall:
  max_rounds: 8
  max_new_tokens: 512
  temperature: 0.0
  format: lfm
  max_context_chars: 12000
  max_obs_chars: 1024
  sandbox_timeout_s: 30

openclaw_eval:
  dataset: json
  data_file: data/openclaw_eval_heldout.jsonl
  split: train
  num_examples: null
  n_samples: 1
  few_shot_k: 0
  strict_box_verify: true
  out_dir: outputs/benchmarks/openclaw-rl
  seed: 0
