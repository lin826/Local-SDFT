# Easy curated math demo eval (primary metric for tool-use SDFT).
# Override model.name for base vs merged checkpoint.

model:
  name: LiquidAI/LFM2.5-230M
  dtype: float32

toolcall:
  max_rounds: 8
  max_new_tokens: 512
  temperature: 0.0
  format: auto
  max_context_chars: 8192
  max_obs_chars: 1024
  sandbox_timeout_s: 30

openclaw_eval:
  dataset: json
  data_file: data/openclaw_demo.jsonl
  split: train
  num_examples: null
  n_samples: 1
  strict_box_verify: true
  out_dir: outputs/benchmarks/openclaw-rl
  seed: 0
