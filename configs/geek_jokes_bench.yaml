# Geek-jokes benchmark: 200 PHD Comics (most popular) held-out eval prompts.
# Uses the same Alpaca JSONL as training; benchmark runner scores generation latency
# and writes sample completions under outputs/benchmarks/.

model:
  name: LiquidAI/LFM2.5-230M
  dtype: float32

data:
  dataset: json
  data_files: data/geek_jokes.jsonl
  split: train
  prompt_fields: [instruction, input]
  response_field: output
  num_examples: 200
  seed: 0

generation:
  num_shots: 0
  batch_size: 4
  max_new_tokens: 128
  temperature: 0.0
  top_p: 1.0
  min_response_chars: 1
  out_path: data/geek_jokes_bench_generations.jsonl

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: .*self_attn\.(q|k|v|out)_proj

training:
  output_dir: outputs/geek-jokes-lfm25-230m
  epochs: 2
  lr: 0.0002
  batch_size: 4
  grad_accum: 4
  max_length: 1024
  warmup_steps: 10
  logging_steps: 10
  save_strategy: epoch
  seed: 0
