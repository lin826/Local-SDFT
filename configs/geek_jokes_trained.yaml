# Geek-jokes config pointing at the merged post-training checkpoint.
# Train with configs/geek_jokes.yaml, then merge:
#   uv run python -m sdft.train --config configs/geek_jokes.yaml
#   uv run python -m sdft.merge --config configs/geek_jokes.yaml
# Merged weights land in outputs/geek-jokes-lfm25-230m-merged by default.

model:
  name: outputs/geek-jokes-lfm25-230m-merged
  dtype: float32

data:
  dataset: json
  data_files: data/geek_jokes.jsonl
  split: train
  prompt_fields: [instruction, input]
  response_field: output
  num_examples: 200
  seed: 0

generation:
  num_shots: 2
  batch_size: 8
  max_new_tokens: 128
  temperature: 0.0
  top_p: 1.0
  min_response_chars: 1
  out_path: data/geek_jokes_sdft.jsonl

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: .*self_attn\.(q|k|v|out)_proj

training:
  output_dir: outputs/geek-jokes-lfm25-230m
  epochs: 2
  lr: 0.0002
  batch_size: 4
  grad_accum: 4
  max_length: 1024
  warmup_steps: 10
  logging_steps: 10
  save_strategy: epoch
  seed: 0
