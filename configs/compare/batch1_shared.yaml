# Shared batch-size-1 comparison suite (mirrors online-learning update style).
# Used by scripts/run_batch1_comparison.py

model:
  name: LiquidAI/LFM2.5-230M
  dtype: float32

data:
  dataset: yahma/alpaca-cleaned
  split: train
  prompt_fields: [instruction, input]
  response_field: output
  num_examples: 32
  seed: 0

generation:
  num_shots: 2
  batch_size: 4
  max_new_tokens: 192
  temperature: 0.0
  top_p: 1.0
  min_response_chars: 1
  out_path: data/compare/batch1_sdft.jsonl

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules: .*self_attn\.(q|k|v|out)_proj

training:
  output_dir: outputs/compare/batch1-sdft
  epochs: 1
  lr: 0.0001
  batch_size: 1
  grad_accum: 1
  max_length: 512
  warmup_steps: 0
  logging_steps: 4
  save_strategy: "no"
  seed: 0
  target_field: sdft_response

grpo:
  output_dir: outputs/compare/batch1-grpo
  epochs: 1
  lr: 0.00005
  batch_size: 2
  grad_accum: 1
  num_generations: 2
  max_prompt_length: 384
  max_completion_length: 192
  temperature: 0.7
  warmup_steps: 0
  logging_steps: 1
  save_strategy: "no"
  seed: 0
  reward: instruction
