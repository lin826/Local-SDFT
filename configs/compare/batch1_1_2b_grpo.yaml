# GRPO at smallest valid group for LFM2.5-1.2B-Thinking.

model:
  name: LiquidAI/LFM2.5-1.2B-Thinking
  dtype: float16

data:
  dataset: yahma/alpaca-cleaned
  split: train
  prompt_fields: [instruction, input]
  response_field: output
  num_examples: 16
  seed: 0

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules: .*self_attn\.(q|k|v|out)_proj

grpo:
  output_dir: outputs/compare/batch1-1_2b-grpo
  epochs: 1
  lr: 0.00005
  batch_size: 2
  grad_accum: 1
  num_generations: 2
  max_prompt_length: 256
  max_completion_length: 128
  temperature: 0.7
  warmup_steps: 0
  logging_steps: 1
  save_strategy: "no"
  seed: 0
  reward: instruction
