# Realistic "learn while doing" demo: a personal inbox assistant that learns
# YOUR triage policy from corrections as you clear your mail.
#
#   python scripts/demo_inbox.py --rounds 4
#
# Correction-driven (no reward_fn): you fix the assistant's suggestion, that
# becomes the training target (stable completion-NLL / SFT).

# Semantic 5-way routing needs real language understanding: the 230M learns only
# the lexical categories (newsletter/manager) and overfits; LFM2-1.2B — still an
# on-device edge model (laptop/phone) — handles the full policy.
model:
  name: "LiquidAI/LFM2-1.2B"
  dtype: "bfloat16"

lora:
  r: 32
  alpha: 64
  target_modules: '.*(self_attn\.(q|k|v|out)_proj|feed_forward\.w[123])'

online:
  backend: "torch"
  loss_type: "sft"           # corrections are exact targets -> supervised NLL
  serve_temperature: 0.0     # deterministic handling suggestions
  serve_max_new_tokens: 16
  lr: 1.0e-4
  min_new_demos: 4
  steps_per_update: 10
  demos_per_step: 4
  replay_ratio: 0.5
  eval_every_n_updates: 0
  db_path: "data/demo_inbox.db"
  adapters_dir: "data/demo_inbox_adapters"
